<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>ModemChecker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #fafafa;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: #171717;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 32px -4px rgba(0,0,0,0.08), 0 4px 8px -2px rgba(0,0,0,0.08);
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 26px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      line-height: 22px;
      color: #737373;
      margin-bottom: 24px;
    }

    .error {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      color: #be123c;
      margin-bottom: 16px;
      display: none;
    }

    .error.visible { display: block; }

    input[type="password"] {
      width: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      padding: 12px 16px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      color: #171717;
    }

    input[type="password"]:focus {
      border-color: #0891b2;
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
    }

    input[type="password"]::placeholder { color: #a3a3a3; }

    button {
      width: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 12px;
      margin-top: 12px;
      background: #0891b2;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #0e7490; }
    button:active { background: #155e75; }

    .help {
      font-size: 14px;
      font-weight: 500;
      color: #737373;
      text-align: center;
      margin-top: 20px;
      line-height: 20px;
    }

    .help a {
      color: #0891b2;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .help a:hover { color: #0e7490; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ModemChecker</h1>
    <p class="subtitle">Enter the site password to continue.</p>
    <div class="error" id="error">Incorrect password. Please try again.</div>
    <form action="/api/login" method="POST">
      <input type="password" name="password" placeholder="Password" required autofocus />
      <button type="submit">Continue</button>
    </form>
    <p class="help">Need the password? <a href="https://belongranda.atlassian.net/wiki/spaces/BEL/pages/3814556263/BYO+Modem+Tools+Compatibility+checker+setup+guides#Try-out-the-demo-for-yourself%3A" target="_blank" rel="noopener">Get it from here</a></p>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('error')) {
      document.getElementById('error').classList.add('visible');
    }
  </script>
</body>
</html>
